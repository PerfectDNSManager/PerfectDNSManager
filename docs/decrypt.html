<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src https://pdm.appstorefr.net; font-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
    <title>Perfect DNS Manager - Decrypt</title>
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"
            integrity="sha384-XOR3aNvHciLPIf6r+2glkrmbBbLmIJ1EChMXjw8eBKBf8gE0rDq1TyUNuRdorOqi"
            crossorigin="anonymous"></script>
    <style>
        :root { --bg: #121212; --surface: #1E1E1E; --card: #252525; --primary: #2196F3; --accent: #FFD700; --text: #FFFFFF; --text-dim: #BBBBBB; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; font-size: 1.5em; }
        h1 span { color: var(--accent); }
        .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 24px; font-size: 0.9em; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #333; }
        .card h2 { color: var(--primary); font-size: 1.1em; margin-bottom: 12px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-row input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: var(--surface); color: var(--text); font-size: 16px; font-family: monospace; }
        .input-row input:focus { outline: none; border-color: var(--primary); }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-accent { background: #4CAF50; }
        #status { padding: 10px; border-radius: 8px; margin-bottom: 12px; display: none; font-size: 0.9em; }
        .status-ok { background: #1B5E20; display: block !important; }
        .status-err { background: #B71C1C; display: block !important; }
        .status-info { background: #1565C0; display: block !important; }
        #result { background: var(--surface); border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.6; color: #CCCCCC; display: none; max-height: 70vh; overflow-y: auto; border: 1px solid #333; }
        #result h1, #result h2, #result h3 { color: var(--accent); margin: 12px 0 6px; font-family: -apple-system, sans-serif; }
        #result table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        #result th, #result td { border: 1px solid #444; padding: 6px 10px; text-align: left; font-size: 12px; }
        #result th { background: #333; color: var(--primary); }
        #result blockquote { border-left: 3px solid var(--primary); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
        #result code { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        #result hr { border: none; border-top: 1px solid #444; margin: 12px 0; }
        #result em { color: var(--text-dim); }
        #result strong { color: var(--text); }
        .lock-icon { font-size: 1.2em; }
        a { color: var(--primary); }
        .footer { text-align: center; margin-top: 24px; color: var(--text-dim); font-size: 0.8em; }
        .actions { display: none; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="lock-icon">&#x1F512;</span> Perfect DNS Manager <span>Decrypt</span></h1>
        <p class="subtitle">AES-128-GCM + Argon2id &mdash; Client-side decryption (the key never leaves your browser)</p>

        <div class="card" id="inputCard">
            <h2>&#x1F511; Enter share code &amp; password</h2>
            <div class="input-row">
                <input type="text" id="codeInput" placeholder="abcd1234" autofocus>
            </div>
            <div class="input-row">
                <input type="text" id="pwdInput" placeholder="a2z5s1">
                <button id="btnDecrypt">Decrypt</button>
            </div>
            <div id="status"></div>
        </div>

        <div id="result"></div>
        <div class="actions" id="actions">
            <button id="btnCopy">Copy</button>
            <button id="btnDownload" class="btn-accent">Download</button>
        </div>

        <div class="footer">
            <a href="https://appstorefr.github.io/PerfectDNSManager/">Perfect DNS Manager</a> &mdash; Open source DNS manager for Android
        </div>
    </div>

<script>
    const PDM_BASE = 'https://pdm.appstorefr.net';
    let currentPlaintext = null;

    // Argon2id — doivent matcher EncryptedSharer.kt côté app (format v2)
    const FORMAT_VERSION = 0x02;
    const ARGON2_M_KIB = 32 * 1024;   // 32 MiB
    const ARGON2_T_COST = 3;
    const ARGON2_PARALLEL = 1;
    const AES_KEY_BYTES = 16;
    const SALT_SIZE = 16;
    const IV_SIZE = 12;

    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const slug = (params.get('s') || '').trim();
        if (slug) {
            document.getElementById('codeInput').value = slug;
            document.getElementById('pwdInput').focus();
        }
        document.getElementById('btnDecrypt').addEventListener('click', submitCode);
        document.getElementById('btnCopy').addEventListener('click', copyResult);
        document.getElementById('btnDownload').addEventListener('click', downloadResult);
        document.getElementById('pwdInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitCode();
        });
    });

    function extractSlug(input) {
        const trimmed = input.trim();
        try {
            const u = new URL(trimmed);
            if (u.hostname === 'pdm.appstorefr.net') {
                return u.pathname.replace(/^\/(d\/|decrypt\/|r\/)?/, '').replace(/\/$/, '').split('?')[0];
            }
        } catch (e) { /* not a URL */ }
        if (/^[a-z0-9]{4,16}$/i.test(trimmed)) return trimmed.toLowerCase();
        return null;
    }

    async function submitCode() {
        const codeRaw = document.getElementById('codeInput').value;
        const pwd = document.getElementById('pwdInput').value.trim();
        const slug = extractSlug(codeRaw);
        if (!slug) { setStatus('err', 'Lien ou code invalide.'); return; }
        if (!pwd) { setStatus('err', 'Mot de passe requis.'); return; }
        await decryptFromSlug(slug, pwd);
    }

    async function decryptFromSlug(slug, password) {
        setStatus('info', 'Downloading & deriving key (Argon2id, ~1-3s)…');
        try {
            const r = await fetch(PDM_BASE + '/r/' + encodeURIComponent(slug), { cache: 'no-store' });
            if (r.status === 404) { setStatus('err', 'Share expired or not found.'); return; }
            if (!r.ok) { setStatus('err', 'Server error (' + r.status + ').'); return; }
            const bytes = new Uint8Array(await r.arrayBuffer());
            const minLen = 1 + SALT_SIZE + IV_SIZE + 16;
            if (bytes.length < minLen) { setStatus('err', 'Invalid content (too short).'); return; }
            if (bytes[0] !== FORMAT_VERSION) {
                setStatus('err', 'Format non supporté (ancien lien ?).');
                return;
            }
            const text = await decryptBytes(bytes, password);
            showResult(text);
            setStatus('ok', 'Decrypted successfully!');
        } catch (e) {
            setStatus('err', 'Decryption failed: ' + (e.message || 'bad password?'));
        }
    }

    async function deriveKey(password, salt) {
        if (typeof argon2 === 'undefined' || !argon2.hash) {
            throw new Error('Argon2 lib non chargée (check réseau / CDN)');
        }
        const result = await argon2.hash({
            pass: new TextEncoder().encode(password),
            salt: salt,
            time: ARGON2_T_COST,
            mem: ARGON2_M_KIB,
            parallelism: ARGON2_PARALLEL,
            hashLen: AES_KEY_BYTES,
            type: argon2.ArgonType.Argon2id
        });
        return crypto.subtle.importKey(
            'raw',
            result.hash,
            { name: 'AES-GCM', length: 128 },
            false,
            ['decrypt']
        );
    }

    async function decryptBytes(combined, password) {
        const salt = combined.slice(1, 1 + SALT_SIZE);
        const iv = combined.slice(1 + SALT_SIZE, 1 + SALT_SIZE + IV_SIZE);
        const ct = combined.slice(1 + SALT_SIZE + IV_SIZE);
        const key = await deriveKey(password, salt);
        const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        return new TextDecoder().decode(pt);
    }

    function showResult(text) {
        currentPlaintext = text;
        const el = document.getElementById('result');
        el.style.display = 'block';
        el.innerHTML = markdownToHtml(text);
        document.getElementById('actions').style.display = 'flex';
    }

    function copyResult() {
        if (!currentPlaintext) return;
        navigator.clipboard.writeText(currentPlaintext).then(() => setStatus('ok', 'Copied!'));
    }

    function downloadResult() {
        if (!currentPlaintext) return;
        const blob = new Blob([currentPlaintext], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pdm-export.txt';
        a.click();
        URL.revokeObjectURL(url);
    }

    function markdownToHtml(md) {
        let html = md
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^# (.+)$/gm, '<h1>$1</h1>')
            .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/^---$/gm, '<hr>')
            .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, text, url) => {
                // Bloque javascript:/data:/vbscript: pour éviter XSS
                const safe = /^(https?:\/\/|\/|mailto:)/i.test(url);
                return safe
                    ? '<a href="' + url.replace(/"/g, '&quot;') + '" target="_blank" rel="noopener noreferrer">' + text + '</a>'
                    : text;
            });

        html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (match, header, sep, body) => {
            const headers = header.split('|').filter(c => c.trim()).map(c => '<th>' + c.trim() + '</th>').join('');
            const rows = body.trim().split('\n').map(row => {
                const cells = row.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('');
                return '<tr>' + cells + '</tr>';
            }).join('');
            return '<table><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table>';
        });

        html = html.replace(/\n/g, '<br>');
        return html;
    }

    function setStatus(type, msg) {
        const el = document.getElementById('status');
        el.className = 'status-' + type;
        el.textContent = msg; // textContent — évite XSS via message d'erreur
    }
</script>
</body>
</html>
