name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Suffixe version (ex: beta.1, rc.2 — vide pour stable)"
        required: false
        default: "beta.0"
      create_release:
        description: "Créer une release GitHub avec l'APK"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 manquant"
            exit 1
          fi
          mkdir -p signing
          echo "$KEYSTORE_BASE64" | base64 -d > signing/release-keystore.jks
          ls -l signing/release-keystore.jks

      - name: Compute version suffix
        id: ver
        run: |
          SUFFIX=""
          IS_PRERELEASE="false"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [[ "$TAG" == *-* ]]; then
              SUFFIX="${TAG#*-}"
              IS_PRERELEASE="true"
            fi
          else
            SUFFIX="${{ github.event.inputs.version_suffix }}"
            [ -n "$SUFFIX" ] && IS_PRERELEASE="true"
          fi
          if [ -n "$SUFFIX" ]; then
            # Patch version.properties with suffix
            if grep -q "VERSION_SUFFIX" app/version.properties 2>/dev/null; then
              sed -i "s/^VERSION_SUFFIX=.*/VERSION_SUFFIX=$SUFFIX/" app/version.properties
            else
              echo "VERSION_SUFFIX=$SUFFIX" >> app/version.properties
            fi
          fi
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          cat app/version.properties

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/signing/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Aucun APK trouvé dans app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename "$APK")" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Verify signature
        run: |
          "$ANDROID_HOME"/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)/apksigner verify --verbose "${{ steps.apk.outputs.path }}" | head -30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v-dispatch-{0}', github.run_number) }}
          name: ${{ github.event_name == 'push' && github.ref_name || format('Manual build #{0}', github.run_number) }}
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
