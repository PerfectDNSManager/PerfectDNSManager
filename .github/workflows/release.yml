name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Version suffix (ex: beta.1). Leave empty for stable."
        required: false
        default: "beta.0"
      create_release:
        description: "Create a GitHub Release with the APK"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Force Node.js 24 sur les actions encore livrÃĐes sous Node 20 (deprecation
      # GH 2026-06-02). Sans Ã§a : warning sur chaque run + actions cassÃĐes Ã  terme.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 is missing"
            exit 1
          fi
          mkdir -p signing
          echo "$KEYSTORE_BASE64" | base64 -d > signing/release-keystore.jks
          ls -l signing/release-keystore.jks

      - name: Compute version and release metadata
        id: meta
        run: |
          SUFFIX=""
          IS_PRERELEASE="false"
          TAG_NAME=""
          RELEASE_NAME=""

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME}"
            CLEAN="${GITHUB_REF_NAME#v}"
            case "$CLEAN" in
              *-*) SUFFIX="${CLEAN#*-}"; IS_PRERELEASE="true" ;;
            esac
          else
            SUFFIX="${{ github.event.inputs.version_suffix }}"
            TAG_NAME="v-dispatch-${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="Manual build #${GITHUB_RUN_NUMBER}"
            if [ -n "$SUFFIX" ]; then IS_PRERELEASE="true"; fi
          fi

          if [ -n "$SUFFIX" ]; then
            if grep -q "VERSION_SUFFIX" app/version.properties 2>/dev/null; then
              sed -i "s/^VERSION_SUFFIX=.*/VERSION_SUFFIX=$SUFFIX/" app/version.properties
            else
              echo "VERSION_SUFFIX=$SUFFIX" >> app/version.properties
            fi
          fi

          # On reproduit ici le calcul de gradle (computedVersionName) pour
          # que le body du release latest-beta annonce la MÃME version que
          # celle baked dans BuildConfig.VERSION_NAME cÃītÃĐ APK. Sinon, le tag
          # dit "v1.1.0-beta.54" mais l'APK porte "1.1.54-beta.54", et la
          # comparaison sÃĐmantique cÃītÃĐ UpdateManager dit "no update".
          M=$(grep '^VERSION_MAJOR=' app/version.properties | cut -d= -f2)
          N=$(grep '^VERSION_MINOR=' app/version.properties | cut -d= -f2)
          B=$(grep '^VERSION_BUILD=' app/version.properties | cut -d= -f2)
          if [ -n "$SUFFIX" ]; then
            VERSION_NAME="${M}.${N}.${B}-${SUFFIX}"
          else
            VERSION_NAME="${M}.${N}.${B}"
          fi

          {
            echo "suffix=$SUFFIX"
            echo "prerelease=$IS_PRERELEASE"
            echo "tag_name=$TAG_NAME"
            echo "release_name=$RELEASE_NAME"
            echo "version_name=$VERSION_NAME"
          } >> "$GITHUB_OUTPUT"
          cat app/version.properties

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/signing/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found in app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Verify signature
        run: |
          BT_DIR=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)
          "$ANDROID_HOME/build-tools/$BT_DIR/apksigner" verify --verbose "${{ steps.apk.outputs.path }}" | head -30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # Pour les stables : on duplique l'APK sous deux noms fixes joints Ã  la
      # release. GitHub route `releases/latest/download/X` vers la release
      # marquÃĐe isLatest=true (par dÃĐfaut, la derniÃĻre non-prerelease).
      #   âĒ PerfectDNSManager-latest.apk : nom self-documenting (prÃĐfÃĐrÃĐ).
      #   âĒ latest.apk : conservÃĐ pour compat Downloader AFTVnews 2759555 +
      #     tout vieux lien externe. Ã retirer le jour oÃđ le code Downloader
      #     pointe vers le nom long.
      - name: Stage stable-name APK aliases
        if: steps.meta.outputs.prerelease != 'true' && (github.event_name == 'push' || github.event.inputs.create_release == 'true')
        id: stable_apk
        run: |
          OUT_DIR="app/build/outputs/apk/release"
          PRETTY_PATH="$OUT_DIR/PerfectDNSManager-latest.apk"
          LEGACY_PATH="$OUT_DIR/latest.apk"
          cp "${{ steps.apk.outputs.path }}" "$PRETTY_PATH"
          cp "${{ steps.apk.outputs.path }}" "$LEGACY_PATH"
          echo "pretty=$PRETTY_PATH" >> "$GITHUB_OUTPUT"
          echo "legacy=$LEGACY_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.stable_apk.outputs.pretty }}
            ${{ steps.stable_apk.outputs.legacy }}
          generate_release_notes: true

      - name: Stage stable-name APK for latest-beta pointer
        if: steps.meta.outputs.prerelease == 'true' && (github.event_name == 'push' || github.event.inputs.create_release == 'true')
        id: beta_apk
        run: |
          STABLE_NAME="PerfectDNSManager-latest-beta.apk"
          STABLE_PATH="app/build/outputs/apk/release/$STABLE_NAME"
          cp "${{ steps.apk.outputs.path }}" "$STABLE_PATH"
          echo "path=$STABLE_PATH" >> "$GITHUB_OUTPUT"

      - name: Update latest-beta pointer release
        if: steps.meta.outputs.prerelease == 'true' && (github.event_name == 'push' || github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-beta
          name: Latest beta
          prerelease: true
          body: |
            Lien stable pointant toujours vers la derniÃĻre bÃŠta publiÃĐe.

            Build actuel : **v${{ steps.meta.outputs.version_name }}**

            Installation :
            ```
            https://github.com/appstorefr/PerfectDNSManager/releases/download/latest-beta/PerfectDNSManager-latest-beta.apk
            ```
          files: ${{ steps.beta_apk.outputs.path }}

      # Purge des bÃŠtas prÃĐcÃĐdentes : on ne garde que la nouvelle (TAG_NAME) et
      # le pointeur rolling `latest-beta`. Pas d'historique â chaque bÃŠta
      # remplace la prÃĐcÃĐdente. Les stables (non-prerelease) sont prÃĐservÃĐes.
      - name: Prune old beta releases
        if: steps.meta.outputs.prerelease == 'true' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_TAG: ${{ steps.meta.outputs.tag_name }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName,isPrerelease,isLatest \
            -q '.[] | select(.isPrerelease == true and .isLatest == false) | .tagName' \
            | while read -r tag; do
                [ "$tag" = "$KEEP_TAG" ] && continue
                [ "$tag" = "latest-beta" ] && continue
                echo "â delete $tag"
                gh release delete --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes "$tag" || true
              done
